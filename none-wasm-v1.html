<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Standard JS Spline (No Typed Arrays)</title>
  <style>
    body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; background: #222; padding: 20px; border-radius: 8px; }
    canvas { border: 1px solid #333; width: 100%; height: 500px; background: #000; }
    .stats { font-family: monospace; font-size: 0.9rem; margin-bottom: 10px; color: #4af626; }
    .slider-group { margin-top: 20px; }
  </style>
</head>
<body>

<div class="container">
  <div id="perf" class="stats">Calculation: 0ms</div>
  <canvas id="splineCanvas"></canvas>

  <div class="slider-group">
    <label>Number of Points (n): <span id="nVal">10000</span></label><br>
    <input type="range" id="nSlider" min="1000" max="1000000" step="1000" value="10000" style="width:100%">
  </div>

  <div class="slider-group">
    <label>Smoothing (p): <span id="pVal">0.0001</span></label><br>
    <input type="range" id="pSlider" min="0" max="0.001" step="0.000001" value="0.0001" style="width:100%">
  </div>
</div>

<script>
  class CubicSmoothingSpline {
    constructor(x, y, p) {
      this.x = x;
      this.y = y;
      this.n = x.length;
      this.p = p;
      this.coeffs = this.compute();
    }

    compute() {
      const n = this.n;
      const x = this.x;
      const y = this.y;
      const p = this.p;
      const h = new Array(n - 1);
      for (let i = 0; i < n - 1; i++) h[i] = x[i + 1] - x[i];

      const rDiag = new Array(n - 2);
      const rOff = new Array(n - 3);
      const rhs = new Array(n - 2);

      for (let i = 0; i < n - 2; i++) {
        rDiag[i] = (h[i] + h[i + 1]) / 3;
        if (i < n - 3) rOff[i] = h[i + 1] / 6;
        rhs[i] = (y[i + 2] - y[i + 1]) / h[i + 1] - (y[i + 1] - y[i]) / h[i];
      }

      const mu = (1 - p) / p;
      const u = this.solveTridiagonal(rDiag, rOff, h, rhs, mu);

      // Changed from .set() to a standard loop for regular arrays
      const fullU = new Array(n).fill(0);
      for (let i = 0; i < u.length; i++) {
        fullU[i + 1] = u[i];
      }

      const coeffs = [];
      for (let i = 0; i < n - 1; i++) {
        const hi = h[i];
        const a = (fullU[i + 1] - fullU[i]) / (6 * hi);
        const b = fullU[i] / 2;
        const c = (y[i + 1] - y[i]) / hi - (hi * (2 * fullU[i] + fullU[i + 1])) / 6;
        const d = y[i];
        coeffs.push([a, b, c, d]);
      }
      return coeffs;
    }

    solveTridiagonal(diag, off, h, rhs, mu) {
      const n = rhs.length;
      const cp = new Array(n);
      const dp = new Array(n);
      const sol = new Array(n);

      const d0 = diag[0] + mu * (1 / h[0] + 1 / h[1]);
      cp[0] = off[0] / d0;
      dp[0] = rhs[0] / d0;

      for (let i = 1; i < n; i++) {
        const penalty = (1 / h[i] + (i < n - 1 ? 1 / h[i + 1] : 0));
        const di = diag[i] + mu * penalty;
        const m = di - off[i - 1] * cp[i - 1];
        if (i < n - 1) cp[i] = off[i] / m;
        dp[i] = (rhs[i] - off[i - 1] * dp[i - 1]) / m;
      }

      sol[n - 1] = dp[n - 1];
      for (let i = n - 2; i >= 0; i--) sol[i] = dp[i] - cp[i] * sol[i + 1];
      return sol;
    }
  }

  const canvas = document.getElementById('splineCanvas');
  const ctx = canvas.getContext('2d');

  const pSlider = document.getElementById('pSlider');
  const pValText = document.getElementById('pVal');
  const nSlider = document.getElementById('nSlider');
  const nValText = document.getElementById('nVal');
  const perfText = document.getElementById('perf');

  let points;
  let xArr;
  let yArr;

  function generateData() {
    points = parseInt(nSlider.value);
    nValText.innerText = points;

    xArr = new Array(points);
    yArr = new Array(points);
    for (let i = 0; i < points; i++) {
      xArr[i] = i;
      yArr[i] = Math.sin(i * 0.05) * 100 + (Math.random() * 20) + 200;
    }
  }

  function draw() {
    const p = parseFloat(pSlider.value);
    pValText.innerText = p;

    const t0 = performance.now();
    const spline = new CubicSmoothingSpline(xArr, yArr, p);
    const t1 = performance.now();

    perfText.innerText = `Calculation (JS): ${(t1 - t0).toFixed(2)}ms | Points: ${points}`;

    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    ctx.beginPath();
    ctx.strokeStyle = "cyan";
    const scaleX = canvas.width / points;
    let segment = 0;

    for (let px = 0; px < canvas.width; px++) {
      const tx = px / scaleX;
      while (segment < points - 2 && xArr[segment + 1] < tx) segment++;
      const dx = tx - xArr[segment];
      const [a, b, c, d] = spline.coeffs[segment];
      const y = a * dx**3 + b * dx**2 + c * dx + d;
      if (px === 0) ctx.moveTo(px, y);
      else ctx.lineTo(px, y);
    }
    ctx.stroke();
  }

  // Event Listeners
  nSlider.addEventListener('input', () => {
    generateData();
    draw();
  });

  pSlider.addEventListener('input', draw);
  window.addEventListener('resize', draw);

  // Initialize
  generateData();
  draw();
</script>
</body>
</html>
